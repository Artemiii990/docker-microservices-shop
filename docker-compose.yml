version: "3.9"

services:

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest

    environment:
      SA_PASSWORD: "Your_password123"
      ACCEPT_EULA: "Y"

    ports:
      - "1433:1433"

    volumes:
      - sql_data:/var/opt/mssql

  # =========================
  # ELASTICSEARCH
  # =========================

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4

    container_name: elasticsearch

    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false

    ports:
      - "9200:9200"

    volumes:
      - elastic_data:/usr/share/elasticsearch/data


  # =========================
  # AUTH SERVICE
  # =========================

  authservice:
    build: ./Backend/DockerBackend/AuthService

    ports:
      - "5001:8080"

    depends_on:
      - db

    env_file:
      - ./Backend/DockerBackend/AuthService/.env

  # =========================
  # PRODUCT SERVICE
  # =========================

  productservice:
    build: ./Backend/DockerBackend/ProductService

    ports:
      - "5002:8080"

    depends_on:
      - db
      - elasticsearch

    env_file:
      - ./Backend/DockerBackend/ProductService/.env

  # =========================
  # ORDER SERVICE
  # =========================

  oorderservice:
    build: ./Backend/DockerBackend/OrderService

    ports:
      - "5003:8080"

    depends_on:
      - db

    env_file:
      - ./Backend/DockerBackend/OrderService/.env

  # =========================
  # BACKEND
  # =========================

  backend:
    build: ./Backend/DockerBackend/WebApplication1

    ports:
      - "5000:8080"

    depends_on:
      - db

    environment:
      - ConnectionStrings__DefaultConnection=Server=db;Database=ShopDb;User Id=sa;Password=Your_password123;TrustServerCertificate=True

  # =========================
  # FRONTEND
  # =========================

  frontend:
    build: ./Frontend/ReactDocker

    ports:
      - "3000:5173"

    command: npm run dev -- --host

  # =========================
  # MINIO (S3)
  # =========================

  minio:
    image: minio/minio

    container_name: minio

    ports:
      - "9000:9000"
      - "9001:9001"

    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123

    command: server /data --console-address ":9001"

    volumes:
      - minio_data:/data

# =========================
# VOLUMES
# =========================

volumes:
  sql_data:
  minio_data:
  elastic_data: